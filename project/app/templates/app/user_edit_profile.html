{% extends 'app/profile_base.html' %}
{% load static %}

{% block menu_edit %}active{% endblock %}

{% block profile_content %}
<link rel="stylesheet" href="{% static 'app/css/user_edit_profile.css' %}">

<section class="hero-banner">
    <div class="hero-text">
        <h1><b>Editează profilul</b></h1>
        <p>Actualizează datele tale pentru o experiență personalizată.</p>
    </div>
</section>

<div class="edit-container">
    <div class="tab-header">
        <button class="tab-btn active" onclick="openTab(event, 'personal')">Date personale</button>
        <button class="tab-btn" onclick="openTab(event, 'professional')">Date profesionale</button>
        <button class="tab-btn" onclick="openTab(event, 'info')">Informații profil</button>
    </div>

    <form method="POST" class="edit-form">
        {% csrf_token %}
        
        <div id="personal" class="tab-content active">
            <div class="form-grid">
                <div class="form-column">
                    <div class="input-group">
                        <label>Nume *</label>
                        <input type="text" name="last_name" value="{{ user.last_name }}">
                    </div>
                    <div class="input-group">
                        <label>Prenume *</label>
                        <input type="text" name="first_name" value="{{ user.first_name }}">
                    </div>
                    <div class="input-group">
                        <label>Telefon *</label>
                        <input type="text" name="phone" value="{{ user.phone }}">
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ user.email }}">
                    </div>
                </div>
                <div class="form-column">
                    <div class="input-group">
                        <label>Adresa de corespondență *</label>
                        <textarea name="address" rows="4">{{ user.address }}</textarea>
                    </div>
                    <div class="input-group">
                        <label>Oraș</label>
                        <input type="text" name="city" value="{{ user.city }}">
                    </div>
                </div>
            </div>
        </div>

        <div id="professional" class="tab-content">
            <div class="form-grid">
                <div class="form-column">
                    <div class="input-group">
                        <label>Cod parafă *</label>
                        <input type="text" name="parafa_code" value="{{ user.parafa_code }}">
                    </div>
                    <div class="input-group">
                        <label>CUIM *</label>
                        <input type="text" name="cuim" value="{{ user.cuim }}">
                    </div>
                </div>
            </div>
        </div>

        <div id="info" class="tab-content">
            <div class="form-grid">
                <div class="form-column">
                    <h3>Modificare Parolă</h3>
                    <div class="input-group">
                        <label>Parola curentă</label>
                        <input type="password" name="current_password" placeholder="********">
                    </div>
                    <div class="input-group">
                        <label>Noua parolă</label>
                        <input type="password" name="new_password">
                    </div>
                </div>
            </div>
        </div>

        <div class="form-footer">
            <button type="submit" class="btn-save">Salvează modificările</button>
        </div>
    </form>
</div>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }
</script>
{% endblock %}
